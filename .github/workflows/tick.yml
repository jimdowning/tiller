# Scheduled self-tick (#24): the self-hosted derived plan stays current
# without anyone running tick.mjs by hand. Daily watermarked tick (#6), weekly
# --full tick to catch cross-reference-only changes that don't bump an item's
# updated_at; snapshots are committed (date-named → conflict-free), state is
# cached best-effort.
#
# Safety properties this relies on (docs/architecture.md):
#   - a cold .tiller/state cache is safe by design — sensing is stateless and
#     idempotent, facts re-derive; only hysteresis continuity is lost, and the
#     asymmetric gate dispatches first-ripenings immediately anyway
#   - a degraded sense fails loudly BEFORE any state write — the job goes red,
#     which is the correct surfacing (never --accept-shrink on a schedule)
#   - operator/agent attestations reach this tick as sensed comments (#23);
#     the runner's ephemeral fact log never needs local attest facts
name: tick

on:
  schedule:
    - cron: '23 5 * * *'   # daily watermarked tick
    - cron: '41 6 * * 1'   # weekly full drill (cross-ref blind-spot floor, #6)
  workflow_dispatch:
    inputs:
      full:
        description: 'drill every item, ignoring updated_at watermarks'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # best-effort continuity for the machine-local state (fact log,
      # hysteresis memory, sense watermarks); key on run_id so every run
      # saves, restore the most recent
      - uses: actions/cache@v4
        with:
          path: .tiller/state
          key: tiller-state-${{ github.run_id }}
          restore-keys: |
            tiller-state-
      - name: Reconciliation tick
        env:
          GH_TOKEN: ${{ github.token }}
          FULL: ${{ (github.event.schedule == '41 6 * * 1' || inputs.full) && '--full' || '' }}
        run: TILLER_CONFIG=./tiller.config.mjs node src/tick.mjs $FULL
      - name: Commit snapshot if changed
        run: |
          if [ -n "$(git status --porcelain -- .tiller/snapshots)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .tiller/snapshots
            git commit -m "chore(tick): snapshot $(date -u +%F) [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo 'snapshot unchanged — nothing to commit'
          fi
